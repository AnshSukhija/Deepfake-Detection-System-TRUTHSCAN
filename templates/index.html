<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthScan</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:#e5e7eb;
}

/* Layout */
.container{
  display:grid;
  grid-template-columns:2.8fr 1.2fr;
  min-height:100vh;
}

/* LEFT */
.main{
  padding:60px 100px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:24px;
  min-height:100vh;
}

/* Logo */
.logo{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:800;
  font-size:22px;
  transition:0.3s;
}
.logo:hover{transform:scale(1.05)}

.logo-icon{
  width:44px;
  height:44px;
  border-radius:12px;
  background:#4ade80;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-text span{color:#4ade80;}

h1{font-size:44px;}
p{color:#94a3b8;}

/* Stats */
.stats{display:flex;gap:18px;}

.stat{
  flex:1;
  background:#0f172a;
  padding:18px;
  border-radius:14px;
  transition:0.3s;
}
.stat:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 10px 25px rgba(74,222,128,0.15);
}

/* Upload */
.upload{
  border:2px dashed #4ade80;
  border-radius:16px;
  min-height:220px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.upload:hover{
  transform:scale(1.02);
  background:rgba(74,222,128,0.05);
}

/* Preview */
#preview{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}

/* Buttons */
.buttons{display:flex;gap:12px;}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}
button:hover{transform:translateY(-2px)}

.primary{
  background:#4ade80;
  color:#000;
}
.primary:hover{
  box-shadow:0 0 20px rgba(74,222,128,0.4);
}

.secondary{
  background:#1e293b;
  color:#fff;
}

/* RESULT */
.result{
  display:none;
}

#resultBox{
  background:#0f172a;
  border-radius:16px;
  padding:20px;
  text-align:center;
  animation:fadeUp 0.4s ease;
}

#resultImage{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
}

#verdict{
  font-size:22px;
  font-weight:700;
}

.real{color:#4ade80;}
.fake{color:#ef4444;}

@keyframes fadeUp{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* RIGHT */
.demo{
  border-left:1px solid #1e293b;
  position:relative;
  min-height:100vh;
}

.face-container{
  position:absolute;
  inset:0;
}

.face-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.mask-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  transition:1s ease;
}

.demo-text{
  position:absolute;
  bottom:40px;
  left:30px;
  font-size:26px;
  font-weight:700;
  opacity:1;
  transition:0.4s;
}
.hidden-text{opacity:0}
</style>
</head>

<body>

<div class="container">

<div class="main">

<div class="logo">
  <div class="logo-icon">👁</div>
  <div class="logo-text">TRUTH<span>SCAN</span></div>
</div>

<h1>Unmask Deepfakes</h1>
<p>Reveal hidden manipulations using AI</p>

<div class="stats">
  <div class="stat"><h3 style="color:#4ade80">97%</h3><p>Accuracy</p></div>
  <div class="stat"><h3 style="color:#4ade80">&lt;2s</h3><p>Speed</p></div>

  <!-- ONLY THIS CHANGED -->
  <div class="stat">
    <h3 id="confidenceValue" style="color:#4ade80">--</h3>
    <p>Confidence</p>
  </div>
</div>

<input type="file" id="fileInput" hidden>

<div class="upload" id="uploadBox" onclick="fileInput.click()">
  <div id="uploadText">Click or Drop Image Here</div>
  <img id="preview">
  <p id="fileName" style="font-size:12px;color:#94a3b8;"></p>
</div>

<div class="result" id="result">
  <div id="resultBox">
    <img id="resultImage">
    <h2 id="verdict"></h2>
  </div>
</div>

<div class="buttons">
  <button class="primary" onclick="analyze()">Analyze</button>
  <button class="secondary" onclick="reset()">Reset</button>
</div>

</div>

<div class="demo">
<div class="face-container">
  <img src="{{ url_for('static', filename='your-image.png') }}">
  <div class="mask-overlay" id="mask"></div>
</div>

<div class="demo-text hidden-text" id="demoText">HIDDEN IDENTITY</div>
</div>

</div>

<script>
let file=null;

const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
const fileName=document.getElementById("fileName");
const uploadText=document.getElementById("uploadText");
const uploadBox=document.getElementById("uploadBox");

const result=document.getElementById("result");
const resultImage=document.getElementById("resultImage");
const verdict=document.getElementById("verdict");

const confidenceValue=document.getElementById("confidenceValue");

/* Upload */
fileInput.onchange=e=>{
  file=e.target.files[0];
  showPreview(file);
};

function showPreview(file){
  const reader=new FileReader();
  reader.onload=e=>{
    preview.src=e.target.result;
    preview.style.opacity="1";
  };
  reader.readAsDataURL(file);

  uploadText.innerText="Image Loaded ✅";
  fileName.innerText=file.name;
}

/* Drag drop */
uploadBox.addEventListener("dragover",e=>{
  e.preventDefault();
});
uploadBox.addEventListener("drop",e=>{
  e.preventDefault();
  file=e.dataTransfer.files[0];
  showPreview(file);
});

/* Analyze */
async function analyze(){
  if(!file) return alert("Upload image first");

  const formData=new FormData();
  formData.append("file",file);

  const res=await fetch("/predict",{method:"POST",body:formData});
  const data=await res.json();

  result.style.display="block";

  resultImage.src=preview.src;

  const isReal = data.result === "AUTHENTIC";

  verdict.innerText = isReal ? "REAL IMAGE ✅" : "FAKE IMAGE ❌";
  verdict.className = isReal ? "real" : "fake";

  let confidence = data.confidence;

  let displayConfidence;

  if(isReal){
    displayConfidence = confidence;
  } else {
    displayConfidence = 100 - confidence;
  }

  confidenceValue.innerText = displayConfidence.toFixed(2) + "%";
}

/* Reset */
function reset(){
  file=null;
  result.style.display="none";

  preview.style.opacity="0";
  fileName.innerText="";
  uploadText.innerText="Click or Drop Image Here";

  confidenceValue.innerText="--";
}

/* Animation */
const mask=document.getElementById("mask");
const text=document.getElementById("demoText");

let revealed=false;

function cycle(){
  text.classList.add("hidden-text");

  if(!revealed){
    mask.style.transform="translateY(-100%)";
    mask.style.opacity="0";

    setTimeout(()=>{
      text.innerText="UNVEILING TRUTH";
      text.classList.remove("hidden-text");
    },1000);

  } else {
    mask.style.transform="translateY(0)";
    mask.style.opacity="1";

    setTimeout(()=>{
      text.innerText="HIDDEN IDENTITY";
      text.classList.remove("hidden-text");
    },1000);
  }

  revealed=!revealed;
  setTimeout(cycle,3500);
}

setTimeout(cycle,2000);
</script>

</body>
</html>
